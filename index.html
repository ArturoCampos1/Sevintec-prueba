<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <title>Inicio - Sevintec</title>
</head>
<body>
    <div class="header">
        <img src="/images/logo.png" class="banner" width="200px" alt="logo-sevintec">
                <!-- From Uiverse.io by JaydipPrajapati1910 --> 
                <label for="burger" class="burger">
                <input id="burger" type="checkbox">
                <span></span>
                <span></span>
                <span></span>
                </label>
        <ul id="menu" class="lista-navbar">
            <li><a href="#sobre-nosotros"><b>Sobre Nosotros</b></a></li>
            <li><a href="#servicios"><b>Servicios</b></a></li>
            <li><a href="#localizacion"><b>Localización</b></a></li>
            <li><a href="#contacto"><b>Contacto</b></a></li>
            <li>
                <!-- From Uiverse.io by Galahhad --> 
                <div>
                    <label id="darkModeToggle" class="ui-switch">
                    <input type="checkbox">
                    <div class="slider">
                        <div class="circle"></div>
                    </div>
                    </label>
                </div>
            </li>
        </ul>

            <script>
                const burger = document.getElementById('burger');
                const menu = document.getElementById('menu');
                const darkModeToggle = document.getElementById('darkModeToggle');

                burger.addEventListener('click', () => {
                menu.classList.toggle('clicked');  // activa o desactiva la clase que muestra el menú
                });

                darkModeToggle.addEventListener('change', () => {
                document.body.classList.toggle('dark-mode');
                });
            </script>

    </div>

    <div id="sobre-nosotros" class="content">
        <h2>Sobre Nosotros</h2>
        
    </div>

    <div id="servicios" class="content">
        <h2>Servicios</h2>
        
    </div>

    <div id="localizacion" class="content">
        <h2>Localización</h2>

    </div>

    <div id="contacto" class="content">
        <h2>Contacto</h2>

    </div>

</body>
</html>
